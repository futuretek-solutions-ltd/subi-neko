services:
  app:
    build: .
    ports:
      - "8000:8000"
    #env_file: .env
    environment:
      - PYTHONUNBUFFERED=1

      # Directory where source MKV files are placed for import
      - IMPORT_ROOT=./media/import

      # Directory where finished output files are written
      - OUTPUT_ROOT=./media/output

      # Directory for the SQLite database
      - CONFIG_ROOT=./config

    volumes:
      - ./media:/app/media
      - ./config:/app/config

